<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#1a1a2e"/>
  <!-- Dice body -->
  <g transform="translate(256,240)">
    <!-- Top face -->
    <polygon points="0,-120 130,-50 0,20 -130,-50" fill="#a78bfa"/>
    <!-- Left face -->
    <polygon points="-130,-50 0,20 0,140 -130,70" fill="#7c3aed"/>
    <!-- Right face -->
    <polygon points="130,-50 0,20 0,140 130,70" fill="#6d28d9"/>
    <!-- Dots on top face -->
    <circle cx="-40" cy="-65" r="12" fill="#fff"/>
    <circle cx="40" cy="-35" r="12" fill="#fff"/>
    <!-- Dots on left face -->
    <circle cx="-80" cy="0" r="10" fill="#fff"/>
    <circle cx="-50" cy="30" r="10" fill="#fff"/>
    <circle cx="-65" cy="55" r="10" fill="#fff"/>
    <!-- Dots on right face -->
    <circle cx="65" cy="0" r="10" fill="#fff"/>
    <circle cx="65" cy="45" r="10" fill="#fff"/>
  </g>
</svg>
